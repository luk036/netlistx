name: Multi-Platforms
on: [push]

jobs:
  miniconda:
    name: Miniconda ${{ matrix.os }} for Python ${{ matrix.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v3
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test
          environment-file: environment.yml
          python-version: ${{ matrix.version }}
          auto-activate-base: false
      - shell: bash -l {0}
        run: |
          conda info
          conda list
      - name: Lint
        shell: bash -l {0}
        run: |
          conda install flake8
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run pytest
        shell: bash -l {0}
        run: |
          conda install pytest
          conda install setuptools wheel setuptools_scm
          conda install numpy numba hypothesis jsonschema
          conda install pip
          pip install git+https://github.com/luk036/mywheel.git
          pip install -e .
          pytest
